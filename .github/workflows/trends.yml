name: Fetch Trends
on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 min
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch X trends + Douyin hot search
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          mkdir -p data

          # ── X/Twitter Trends (via Grok x_search) ──
          curl -s https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "grok-3-mini-fast",
              "messages": [{"role": "user", "content": "What are the top 20 trending topics on Twitter/X right now in the US? List them as a JSON array of objects with \"topic\" and \"context\" (one sentence explaining why it is trending). Only output the JSON array, no other text."}],
              "temperature": 0
            }' | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              content = data['choices'][0]['message']['content']
              # Strip markdown code fences if present
              content = content.strip()
              if content.startswith('\`\`\`'):
                  content = content.split('\n', 1)[1]
                  content = content.rsplit('\`\`\`', 1)[0]
              trends = json.loads(content)
              result = {'updated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)', 'trends': trends[:20]}
              json.dump(result, open('data/x-trends.json', 'w'), indent=2)
              print(f'X trends: {len(trends[:20])} items')
          except Exception as e:
              print(f'X trends failed: {e}')
              json.dump({'updated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)', 'trends': [], 'error': str(e)}, open('data/x-trends.json', 'w'))
          "

          # ── Douyin Hot Search (via Grok x_search for 抖音热搜) ──
          curl -s https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $XAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "grok-3-mini-fast",
              "messages": [{"role": "user", "content": "What are the current top 15 trending topics on Douyin (抖音热搜) right now? Include both the Chinese text and an English translation/explanation. List as a JSON array of objects with \"topic_cn\" (Chinese), \"topic_en\" (English translation), and \"context\" (why it is trending, in English). Only output the JSON array."}],
              "temperature": 0
            }' | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              content = data['choices'][0]['message']['content']
              content = content.strip()
              if content.startswith('\`\`\`'):
                  content = content.split('\n', 1)[1]
                  content = content.rsplit('\`\`\`', 1)[0]
              trends = json.loads(content)
              result = {'updated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)', 'trends': trends[:15]}
              json.dump(result, open('data/douyin-trends.json', 'w'), indent=2)
              print(f'Douyin trends: {len(trends[:15])} items')
          except Exception as e:
              print(f'Douyin trends failed: {e}')
              json.dump({'updated': '$(date -u +%Y-%m-%dT%H:%M:%SZ)', 'trends': [], 'error': str(e)}, open('data/douyin-trends.json', 'w'))
          "

      - name: Commit data
        run: |
          git config user.name "narrative-bot"
          git config user.email "bot@narrative.dev"
          git add data/
          git diff --staged --quiet || git commit -m "trends $(date -u +%H:%M)"
          git push
